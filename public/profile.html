<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil — Kucingss</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#faf7f2;--cream2:#f3ede4;--orange:#e8621a;--brown:#2d1a0e;--muted:rgba(45,26,14,.55);--border:rgba(45,26,14,.1);--border-s:rgba(45,26,14,.2);--r:14px}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh}
    nav{background:rgba(250,247,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-decoration:none;color:var(--brown)}
    .nav-right{display:flex;gap:10px;align-items:center}
    .btn-outline{padding:8px 16px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--brown);cursor:pointer;text-decoration:none;transition:all .2s}
    .btn-outline:hover{border-color:var(--orange);color:var(--orange)}
    .btn-danger{padding:8px 16px;border-radius:100px;border:1.5px solid rgba(220,50,50,.3);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#dc3232;cursor:pointer;transition:all .2s}
    .btn-danger:hover{background:rgba(220,50,50,.08)}
    .wrap{max-width:560px;margin:0 auto;padding:40px 20px 80px}
    h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:8px}
    .sub{font-size:14px;color:var(--muted);margin-bottom:32px}
    .card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:16px}
    .avatar-wrap{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
    .avatar{width:70px;height:70px;border-radius:50%;background:var(--cream2);border:2px solid var(--border);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:30px}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .avatar-info{flex:1}
    .avatar-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:2px}
    .avatar-email{font-size:13px;color:var(--muted)}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    input,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border-s);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--brown);background:#fff;outline:none;transition:border-color .2s;resize:none}
    input:focus,textarea:focus{border-color:var(--orange)}
    input:disabled{background:var(--cream2);color:var(--muted);cursor:not-allowed}
    .link-row{display:flex;gap:8px}
    .link-row input:first-child{flex:1}
    .link-row input:last-child{flex:2}
    .btn{width:100%;padding:13px;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;background:var(--orange);color:#fff;transition:opacity .2s,transform .15s}
    .btn:hover{opacity:.85;transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .note{font-size:12px;color:var(--muted);margin-top:5px}
    .success{padding:10px 14px;background:rgba(52,199,89,.08);border:1px solid rgba(52,199,89,.25);border-radius:var(--r);font-size:13px;color:#1a7a3a;margin-bottom:14px;display:none}
    .success.show{display:block}
    .err{padding:10px 14px;background:rgba(232,98,26,.08);border:1px solid rgba(232,98,26,.2);border-radius:var(--r);font-size:13px;color:var(--orange);margin-bottom:14px;display:none}
    .err.show{display:block}
    .cat-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--cream);border-radius:var(--r);margin-bottom:10px}
    .cat-item-img{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--cream2);flex-shrink:0;font-size:24px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .cat-item-img img{width:100%;height:100%;object-fit:cover}
    .cat-item-info{flex:1;min-width:0}
    .cat-item-name{font-size:14px;font-weight:600;margin-bottom:2px}
    .cat-item-price{font-size:13px;color:var(--orange);font-weight:600}
    .cat-item-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:6px;transition:color .2s}
    .cat-item-del:hover{color:#dc3232}
    .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🐱 Kucingss</a>
  <div class="nav-right">
    <a class="btn-outline" href="/">← Beranda</a>
    <button class="btn-danger" id="logoutBtn" type="button">Keluar</button>
  </div>
</nav>

<div class="wrap">
  <h1>Profil Saya</h1>
  <p class="sub">Edit informasi dan lihat iklan kucing kamu.</p>

  <div class="card">
    <div class="avatar-wrap">
      <div class="avatar" id="avatarEl">👤</div>
      <div class="avatar-info">
        <div class="avatar-name" id="profileNameDisplay">-</div>
        <div class="avatar-email" id="profileEmailDisplay">-</div>
      </div>
    </div>

    <div class="success" id="successMsg">Profil berhasil diperbarui!</div>
    <div class="err" id="errMsg"></div>

    <div class="form-group">
      <label>Foto Profil (URL)</label>
      <input type="url" id="avatarUrl" placeholder="https://..." autocomplete="off"/>
      <div class="note">Gunakan URL gambar dari imgur atau hosting lainnya</div>
    </div>

    <div class="form-group">
      <label>Nama</label>
      <input type="text" id="profileName" placeholder="Nama kamu"/>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="profileEmail" disabled/>
    </div>

    <div class="form-group">
      <label>Bio</label>
      <textarea id="profileBio" rows="3" placeholder="Ceritakan sedikit tentang kamu..."></textarea>
    </div>

    <div class="form-group">
      <label>Nomor WhatsApp</label>
      <input type="text" id="profileWa" placeholder="6281234567890 (tanpa +)"/>
      <div class="note">Nomor ini akan ditampilkan di iklan kamu sebagai tombol WA</div>
    </div>

    <div class="form-group">
      <label>Link (Judul & URL)</label>
      <div class="link-row">
        <input type="text" id="profileLinkTitle" placeholder="Judul"/>
        <input type="url" id="profileLink" placeholder="https://..."/>
      </div>
    </div>

    <button class="btn" id="saveBtn" type="button">Simpan Perubahan</button>
  </div>

  <div class="card">
    <h2 style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:16px">Iklan Saya</h2>
    <div id="myCats"><div class="spinner"></div></div>
  </div>
</div>

<script>
(function(){
  var token=localStorage.getItem('kc_token');
  if(!token){ location.href='/signup'; return; }

  var user=null;
  var err=document.getElementById('errMsg');
  var success=document.getElementById('successMsg');

  function showErr(msg){ err.textContent=msg; err.classList.add('show'); success.classList.remove('show'); }
  function showSuccess(){ success.classList.add('show'); err.classList.remove('show'); setTimeout(function(){ success.classList.remove('show'); },3000); }

  function fmt(n){ return 'Rp '+Number(n).toLocaleString('id-ID'); }

  function updateAvatarDisplay(avatarUrl, name){
    var el=document.getElementById('avatarEl');
    if(avatarUrl){ el.innerHTML='<img src="'+avatarUrl+'" alt="avatar" onerror="this.parentElement.textContent=\'👤\'"/>'; }
    else { el.textContent='👤'; }
    document.getElementById('profileNameDisplay').textContent=name||'-';
  }

  fetch('/api/me',{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){ if(r.status===401){localStorage.clear();location.href='/signup';} return r.json(); })
    .then(function(u){
      user=u;
      document.getElementById('profileName').value=u.name||'';
      document.getElementById('profileEmail').value=u.email||'';
      document.getElementById('profileBio').value=u.bio||'';
      document.getElementById('profileWa').value=u.wa||'';
      document.getElementById('profileLink').value=u.link||'';
      document.getElementById('profileLinkTitle').value=u.linkTitle||'';
      document.getElementById('avatarUrl').value=u.avatar||'';
      document.getElementById('profileEmailDisplay').textContent=u.email||'';
      updateAvatarDisplay(u.avatar, u.name);
      localStorage.setItem('kc_user', JSON.stringify(u));
    });

  document.getElementById('avatarUrl').addEventListener('input', function(){
    updateAvatarDisplay(this.value.trim(), document.getElementById('profileName').value);
  });

  document.getElementById('saveBtn').addEventListener('click', function(){
    var btn=this;
    btn.disabled=true; btn.textContent='Menyimpan...';
    var body={
      name:document.getElementById('profileName').value.trim(),
      bio:document.getElementById('profileBio').value.trim(),
      wa:document.getElementById('profileWa').value.trim(),
      link:document.getElementById('profileLink').value.trim(),
      linkTitle:document.getElementById('profileLinkTitle').value.trim(),
      avatar:document.getElementById('avatarUrl').value.trim()
    };
    if(!body.name){ showErr('Nama tidak boleh kosong'); btn.disabled=false; btn.textContent='Simpan Perubahan'; return; }
    fetch('/api/me',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)})
      .then(function(r){ return r.json(); })
      .then(function(u){
        btn.disabled=false; btn.textContent='Simpan Perubahan';
        if(u.error){ showErr(u.error); return; }
        localStorage.setItem('kc_user', JSON.stringify(u));
        updateAvatarDisplay(u.avatar, u.name);
        showSuccess();
      })
      .catch(function(){ showErr('Terjadi kesalahan'); btn.disabled=false; btn.textContent='Simpan Perubahan'; });
  });

  // My cats
  fetch('/api/cats',{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){ return r.json(); })
    .then(function(cats){
      var stored=null;
      try{ stored=JSON.parse(localStorage.getItem('kc_user')); }catch{}
      var uid=stored ? stored.id : null;
      var mine=cats.filter(function(c){ return c.userId===uid; });
      var el=document.getElementById('myCats');
      if(!mine.length){ el.innerHTML='<p style="font-size:13px;color:var(--muted)">Belum ada iklan. <a href="/new" style="color:var(--orange)">Pasang iklan sekarang</a></p>'; return; }
      el.innerHTML='';
      mine.forEach(function(cat){
        var item=document.createElement('div');
        item.className='cat-item';
        item.innerHTML=
          (cat.image ? '<div class="cat-item-img"><img src="'+cat.image+'" alt="'+cat.name+'" onerror="this.parentElement.textContent=\'🐱\'"/></div>' : '<div class="cat-item-img">🐱</div>')+
          '<div class="cat-item-info"><div class="cat-item-name">'+cat.name+'</div><div class="cat-item-price">'+fmt(cat.price)+'</div></div>'+
          '<button class="cat-item-del" data-id="'+cat.id+'" title="Hapus iklan">✕</button>';
        item.querySelector('.cat-item-del').addEventListener('click', function(){
          if(!confirm('Hapus iklan '+cat.name+'?')) return;
          fetch('/api/cats/'+cat.id,{method:'DELETE',headers:{'Authorization':'Bearer '+token}})
            .then(function(){ item.remove(); });
        });
        el.appendChild(item);
      });
    });

  document.getElementById('logoutBtn').addEventListener('click', function(){
    localStorage.removeItem('kc_token');
    localStorage.removeItem('kc_user');
    location.href='/';
  });
})();
</script>
</body>
</html>
