<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pasang Iklan — Kucingss</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#faf7f2;--cream2:#f3ede4;--orange:#e8621a;--brown:#2d1a0e;--muted:rgba(45,26,14,.55);--border:rgba(45,26,14,.1);--border-s:rgba(45,26,14,.2);--r:14px}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh}
    nav{background:rgba(250,247,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-decoration:none;color:var(--brown)}
    .btn-outline{padding:8px 16px;border-radius:100px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--brown);cursor:pointer;text-decoration:none;transition:all .2s}
    .btn-outline:hover{border-color:var(--orange);color:var(--orange)}
    .wrap{max-width:560px;margin:0 auto;padding:40px 20px 80px}
    h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:8px}
    .sub{font-size:14px;color:var(--muted);margin-bottom:32px}
    .card{background:#fff;border:1px solid var(--border);border-radius:20px;padding:28px}
    .form-group{margin-bottom:18px}
    label{display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    input,textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border-s);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--brown);background:#fff;outline:none;transition:border-color .2s;resize:none}
    input:focus,textarea:focus{border-color:var(--orange)}
    .price-wrap{position:relative}
    .price-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}
    .price-wrap input{padding-left:38px}
    .img-preview{width:100%;height:180px;border:2px dashed var(--border-s);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .2s;background:var(--cream2);overflow:hidden;position:relative}
    .img-preview:hover{border-color:var(--orange)}
    .img-preview img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .img-preview-text{font-size:13px;color:var(--muted);text-align:center;position:relative;z-index:1}
    .img-preview-icon{font-size:28px;position:relative;z-index:1}
    .img-preview.has-img .img-preview-icon,.img-preview.has-img .img-preview-text{display:none}
    .btn{width:100%;padding:13px;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;background:var(--orange);color:#fff;transition:opacity .2s,transform .15s;margin-top:8px}
    .btn:hover{opacity:.85;transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .err{padding:10px 14px;background:rgba(232,98,26,.08);border:1px solid rgba(232,98,26,.2);border-radius:var(--r);font-size:13px;color:var(--orange);margin-bottom:14px;display:none}
    .err.show{display:block}
    .note{font-size:12px;color:var(--muted);margin-top:6px}
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🐱 Kucingss</a>
  <a class="btn-outline" href="/">← Kembali</a>
</nav>

<div class="wrap">
  <h1>Pasang Iklan</h1>
  <p class="sub">Isi detail kucing yang ingin kamu jual.</p>

  <div class="card">
    <div class="err" id="errMsg"></div>

    <div class="form-group">
      <label>Foto Kucing</label>
      <div class="img-preview" id="imgPreview">
        <div class="img-preview-icon">📷</div>
        <div class="img-preview-text">Paste link foto atau klik untuk input URL</div>
        <img id="previewImg" src="" alt="" style="display:none"/>
      </div>
      <input type="url" id="imageUrl" placeholder="https://..." style="margin-top:8px" autocomplete="off"/>
      <div class="note">Masukkan URL foto kucing (dari imgur, drive, dll)</div>
    </div>

    <div class="form-group">
      <label>Nama Kucing</label>
      <input type="text" id="catName" placeholder="Contoh: Mochi, Luna, dll" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label>Harga (Rp)</label>
      <div class="price-wrap">
        <span class="price-prefix">Rp</span>
        <input type="number" id="catPrice" placeholder="500000" min="0"/>
      </div>
    </div>

    <div class="form-group">
      <label>Deskripsi</label>
      <textarea id="catDesc" rows="4" placeholder="Ceritakan tentang kucing ini — ras, umur, karakter, kondisi kesehatan, dll"></textarea>
    </div>

    <button class="btn" id="submitBtn" type="button">Pasang Iklan</button>
  </div>
</div>

<script>
(function(){
  var token=localStorage.getItem('kc_token');
  if(!token){ location.href='/signup'; return; }

  var imgPreview=document.getElementById('imgPreview');
  var previewImg=document.getElementById('previewImg');
  var imageUrl=document.getElementById('imageUrl');

  imageUrl.addEventListener('input', function(){
    var url=this.value.trim();
    if(url){
      previewImg.src=url;
      previewImg.style.display='block';
      imgPreview.classList.add('has-img');
      previewImg.onerror=function(){ previewImg.style.display='none'; imgPreview.classList.remove('has-img'); };
    } else {
      previewImg.style.display='none';
      imgPreview.classList.remove('has-img');
    }
  });

  imgPreview.addEventListener('click', function(){ imageUrl.focus(); });

  var err=document.getElementById('errMsg');
  function showErr(msg){ err.textContent=msg; err.classList.add('show'); }
  function hideErr(){ err.classList.remove('show'); }

  document.getElementById('submitBtn').addEventListener('click', function(){
    hideErr();
    var name=document.getElementById('catName').value.trim();
    var price=document.getElementById('catPrice').value;
    var description=document.getElementById('catDesc').value.trim();
    var image=imageUrl.value.trim();
    if(!name||!price||!description){ showErr('Nama, harga, dan deskripsi wajib diisi'); return; }
    if(parseInt(price)<0){ showErr('Harga tidak valid'); return; }
    this.disabled=true; this.textContent='Memposting...';
    var btn=this;
    fetch('/api/cats',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({name,price,description,image})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.error){ showErr(d.error); btn.disabled=false; btn.textContent='Pasang Iklan'; }
      else { location.href='/'; }
    })
    .catch(function(){ showErr('Terjadi kesalahan'); btn.disabled=false; btn.textContent='Pasang Iklan'; });
  });
})();
</script>
</body>
</html>
