<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kucingss - Detail Kucing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080e;
      --surface: rgba(255,255,255,0.04);
      --surface-h: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.07);
      --border-s: rgba(255,255,255,0.13);
      --text: #f2f2f7;
      --muted: rgba(242,242,247,0.45);
      --dim: rgba(242,242,247,0.2);
      --accent: #f59e0b;
      --accent2: #d97706;
      --accent-dim: rgba(245,158,11,0.12);
      --shadow: 0 12px 48px rgba(0,0,0,0.8);
      --r: 18px; --r-sm: 11px;
    }
    [data-theme="light"] {
      --bg: #f0eef8;
      --surface: rgba(255,255,255,0.7);
      --surface-h: rgba(255,255,255,0.9);
      --border: rgba(0,0,0,0.07);
      --border-s: rgba(0,0,0,0.13);
      --text: #08080e;
      --muted: rgba(8,8,14,0.5);
      --dim: rgba(8,8,14,0.22);
      --shadow: 0 12px 48px rgba(0,0,0,0.1);
    }
    html, body { min-height: 100vh; font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text); transition: background 0.35s, color 0.35s; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 50% at 20% 10%, rgba(245,158,11,0.08) 0%, transparent 60%);
    }
    .wrap { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 30px 18px 60px; display: flex; flex-direction: column; gap: 20px; }
    
    nav { display: flex; align-items: center; justify-content: space-between; animation: up 0.4s ease both; }
    .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; color: var(--text); }
    .brand-logo { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .brand-name { font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    .brand-name em { font-style: normal; color: var(--accent); }
    .nav-links { display: flex; gap: 12px; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 12px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .theme-btn { width: 42px; height: 25px; background: var(--surface); border: 1px solid var(--border-s); border-radius: 100px; cursor: pointer; position: relative; backdrop-filter: blur(12px); transition: background 0.3s; flex-shrink: 0; }
    .theme-btn::after { content: ''; position: absolute; top: 3px; left: 3px; width: 17px; height: 17px; border-radius: 50%; background: var(--text); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    [data-theme="light"] .theme-btn::after { transform: translateX(17px); }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); backdrop-filter: blur(28px) saturate(1.5); box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.055); overflow: hidden; animation: up 0.4s 0.13s ease both; }
    .card-inner { padding: 24px; }
    
    .cat-detail-image { width: 100%; max-height: 400px; object-fit: cover; border-radius: var(--r-sm); margin-bottom: 16px; background: var(--surface); }
    .cat-detail-name { font-size: 24px; font-weight: 600; }
    .cat-detail-price { font-size: 20px; font-weight: 600; color: var(--accent); margin-top: 4px; }
    .cat-detail-meta { display: flex; gap: 16px; flex-wrap: wrap; margin: 8px 0 12px; font-size: 13px; color: var(--muted); }
    .cat-detail-desc { font-size: 14px; color: var(--muted); line-height: 1.7; margin: 12px 0; }
    
    .seller-card { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface-h); border: 1px solid var(--border); border-radius: var(--r-sm); margin-top: 12px; cursor: pointer; }
    .seller-card img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .seller-card .name { font-weight: 500; }
    .seller-card .email { font-size: 12px; color: var(--muted); }
    
    .social-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .social-link { padding: 4px 12px; background: var(--surface-h); border: 1px solid var(--border); border-radius: 100px; font-size: 11px; color: var(--muted); text-decoration: none; transition: all 0.2s; }
    .social-link:hover { border-color: var(--accent); color: var(--text); }
    
    .btn { padding: 10px 24px; background: var(--accent); border: none; border-radius: var(--r-sm); cursor: pointer; font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 600; color: #fff; transition: opacity 0.2s, transform 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border-s); color: var(--text); }
    .btn-outline:hover { background: var(--surface-h); }
    
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border-s); border-radius: var(--r-sm); padding: 12px 24px; backdrop-filter: blur(20px); font-size: 13px; color: var(--text); box-shadow: var(--shadow); opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    
    @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<div class="wrap">
  <nav>
    <a href="/" class="brand">
      <div class="brand-logo">🐱</div>
      <div class="brand-name">Kucing<em>ss</em></div>
    </a>
    <div class="nav-links">
      <a href="/">Beranda</a>
      <a href="/profile.html">Profile</a>
      <button class="theme-btn" id="themeBtn" type="button"></button>
    </div>
  </nav>

  <div class="card" id="detailContainer">
    <div class="card-inner" id="detailContent">
      <div style="text-align:center;padding:30px 0;color:var(--muted);">
        <span style="font-size:40px;display:block;margin-bottom:8px;">🐱</span>
        Memuat detail kucing...
      </div>
    </div>
  </div>

  <footer style="text-align:center; font-family:'Geist Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.08em; text-transform:uppercase; padding:10px 0;">
    Kucingss &mdash; Jual Beli Kucing
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var html = document.documentElement;
  html.setAttribute('data-theme', localStorage.getItem('kucingss-theme') || 'dark');
  document.getElementById('themeBtn').addEventListener('click', function() {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('kucingss-theme', next);
  });

  function getCats() {
    return JSON.parse(localStorage.getItem('kucingss-cats') || '[]');
  }

  function getUsers() {
    return JSON.parse(localStorage.getItem('kucingss-users') || '[]');
  }

  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function renderDetail() {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id');
    if (!id) {
      document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);"><span style="font-size:40px;display:block;margin-bottom:8px;">❌</span>ID kucing tidak ditemukan</div>';
      return;
    }

    var cats = getCats();
    var cat = cats.find(c => c.id === id);
    if (!cat) {
      document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--muted);"><span style="font-size:40px;display:block;margin-bottom:8px;">🔍</span>Kucing tidak ditemukan</div>';
      return;
    }

    var users = getUsers();
    var seller = users.find(u => u.email === cat.sellerEmail);
    var img = cat.image || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><rect fill="%23' + (html.getAttribute('data-theme') === 'dark' ? '1a1a24' : 'e8e4f0') + '" width="400" height="300"/><text y="200" font-size="120" text-anchor="middle" x="200">🐱</text></svg>';

    var htmlContent = '';
    htmlContent += '<img class="cat-detail-image" src="' + img + '" alt="' + cat.name + '" onerror="this.src=\'data:image/svg+xml,<svg xmlns=\\"http://www.w3.org/2000/svg\\" viewBox=\\"0 0 400 300\\"><rect fill=\\'' + (html.getAttribute('data-theme') === 'dark' ? '1a1a24' : 'e8e4f0') + '\\' width=\\"400\\" height=\\"300\\"/><text y=\\"200\\" font-size=\\"120\\" text-anchor=\\"middle\\" x=\\"200\\">🐱</text></svg>\'"/>';
    htmlContent += '<div class="cat-detail-name">' + escapeHtml(cat.name) + '</div>';
    htmlContent += '<div class="cat-detail-price">Rp ' + Number(cat.price).toLocaleString('id-ID') + '</div>';
    htmlContent += '<div class="cat-detail-meta">';
    if (cat.breed) htmlContent += '<span>Ras: ' + escapeHtml(cat.breed) + '</span>';
    if (cat.age) htmlContent += '<span>Umur: ' + escapeHtml(cat.age) + '</span>';
    htmlContent += '</div>';
    if (cat.desc) htmlContent += '<div class="cat-detail-desc">' + escapeHtml(cat.desc) + '</div>';

    // Seller
    if (seller) {
      htmlContent += '<div class="seller-card" onclick="location.href=\'/profile.html?user=' + encodeURIComponent(seller.email) + '\'">';
      htmlContent += '<img src="' + (seller.avatar || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23' + (html.getAttribute('data-theme') === 'dark' ? '1a1a24' : 'e8e4f0') + '" width="100" height="100"/><text y="80" font-size="60" text-anchor="middle" x="50">🐱</text></svg>') + '" alt=""/>';
      htmlContent += '<div><div class="name">' + escapeHtml(seller.name) + '</div>';
      htmlContent += '<div class="email">' + escapeHtml(seller.email) + '</div>';
      
      // Social links
      if (seller.socialLinks && seller.socialLinks.length > 0) {
        htmlContent += '<div class="social-links">';
        seller.socialLinks.forEach(function(link) {
          htmlContent += '<a href="' + escapeHtml(link.url) + '" target="_blank" class="social-link">' + escapeHtml(link.title || 'Link') + '</a>';
        });
        htmlContent += '</div>';
      }
      htmlContent += '</div></div>';
    }

    document.getElementById('detailContent').innerHTML = htmlContent;
  }

  renderDetail();
})();
</script>
</body>
</html>
