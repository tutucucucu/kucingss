<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kucingss</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#faf7f2;--cream2:#f3ede4;--orange:#e8621a;--brown:#2d1a0e;--muted:rgba(45,26,14,.55);--dim:rgba(45,26,14,.3);--border:rgba(45,26,14,.1);--shadow:0 8px 32px rgba(45,26,14,.1);--r:16px;--r-sm:10px}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh}
    nav{position:sticky;top:0;z-index:50;background:rgba(250,247,242,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-decoration:none;color:var(--brown);display:flex;align-items:center;gap:8px}
    .nav-right{display:flex;align-items:center;gap:10px}
    .btn{padding:9px 18px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:none}
    .btn-primary{background:var(--orange);color:#fff}
    .btn-primary:hover{opacity:.85;transform:translateY(-1px)}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--brown)}
    .btn-outline:hover{border-color:var(--orange);color:var(--orange)}
    .btn-sm{padding:7px 14px;font-size:12px}
    .user-pill{display:flex;align-items:center;gap:8px;padding:6px 14px;background:var(--cream2);border:1px solid var(--border);border-radius:100px;text-decoration:none;color:var(--brown);font-size:13px;font-weight:500;cursor:pointer}
    .avatar-sm{width:26px;height:26px;border-radius:50%;object-fit:cover;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
    .avatar-sm img{width:100%;height:100%;object-fit:cover}
    .wrap{max-width:1080px;margin:0 auto;padding:40px 20px 80px}
    .hero{text-align:center;margin-bottom:48px}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(32px,6vw,56px);font-weight:700;line-height:1.1;letter-spacing:-.03em;margin-bottom:12px}
    .hero h1 em{font-style:italic;color:var(--orange)}
    .hero p{font-size:16px;color:var(--muted);max-width:420px;margin:0 auto 24px;line-height:1.7}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
    .card{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s}
    .card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
    .card-img{width:100%;height:200px;object-fit:cover;background:var(--cream2);display:block}
    .card-img-placeholder{width:100%;height:200px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:48px}
    .card-body{padding:14px}
    .card-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:4px}
    .card-price{font-size:16px;font-weight:600;color:var(--orange);margin-bottom:8px}
    .card-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
    .seller-row{display:flex;align-items:center;gap:7px}
    .seller-name{font-size:12px;color:var(--muted);font-weight:500}
    .wa-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:#25d366;color:#fff;border-radius:100px;font-size:12px;font-weight:600;text-decoration:none;transition:opacity .2s}
    .wa-btn:hover{opacity:.85}
    .empty{text-align:center;padding:80px 20px;color:var(--muted)}
    .empty-icon{font-size:56px;margin-bottom:16px}
    .loading{text-align:center;padding:60px;color:var(--muted);font-size:14px}
    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="/">🐱 Kucingss</a>
  <div class="nav-right" id="navRight">
    <a class="btn btn-outline btn-sm" href="/signup">Masuk / Daftar</a>
  </div>
</nav>

<div class="wrap">
  <div class="hero">
    <h1>Jual Beli <em>Kucing</em><br>Dengan Mudah</h1>
    <p>Platform untuk pecinta kucing. Pasang iklan kucing kamu dan temukan pembeli yang tepat.</p>
    <a class="btn btn-primary" id="heroBtn" href="/signup">Pasang Iklan Gratis</a>
  </div>
  <div class="grid" id="catGrid">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Memuat...</div>
  </div>
</div>

<script>
(function(){
  var token = localStorage.getItem('kc_token');
  var user = null;
  try { user = JSON.parse(localStorage.getItem('kc_user')); } catch{}

  if(user && token){
    document.getElementById('navRight').innerHTML =
      '<a class="btn btn-primary btn-sm" href="/new">+ Pasang Iklan</a>' +
      '<a class="user-pill" href="/profile">' +
        (user.avatar ? '<span class="avatar-sm"><img src="'+user.avatar+'"/></span>' : '<span class="avatar-sm">👤</span>') +
        user.name +
      '</a>';
    document.getElementById('heroBtn').href = '/new';
    document.getElementById('heroBtn').textContent = '+ Pasang Iklan';
  }

  function fmt(n){ return 'Rp '+Number(n).toLocaleString('id-ID'); }

  fetch('/api/cats')
    .then(function(r){ return r.json(); })
    .then(function(cats){
      var grid = document.getElementById('catGrid');
      if(!cats.length){
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🐾</div><p>Belum ada iklan kucing.<br>Jadilah yang pertama!</p></div>';
        return;
      }
      grid.innerHTML = '';
      cats.forEach(function(cat){
        var card = document.createElement('div');
        card.className = 'card';
        var imgHtml = cat.image
          ? '<img class="card-img" src="'+cat.image+'" alt="'+cat.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="card-img-placeholder" style="display:none">🐱</div>'
          : '<div class="card-img-placeholder">🐱</div>';
        var waHref = cat.seller && cat.seller.wa
          ? 'https://wa.me/'+cat.seller.wa.replace(/[^0-9]/g,'')+
            '?text='+encodeURIComponent('Halo! Saya tertarik dengan kucing "'+cat.name+'" yang kamu jual seharga '+fmt(cat.price)+'. Apakah masih tersedia?')
          : '#';
        card.innerHTML =
          imgHtml +
          '<div class="card-body">'+
            '<div class="card-name">'+cat.name+'</div>'+
            '<div class="card-price">'+fmt(cat.price)+'</div>'+
            '<div class="card-desc">'+cat.description+'</div>'+
            '<div class="card-footer">'+
              '<div class="seller-row">'+
                (cat.seller && cat.seller.avatar
                  ? '<span class="avatar-sm"><img src="'+cat.seller.avatar+'"/></span>'
                  : '<span class="avatar-sm">👤</span>')+
                '<span class="seller-name">'+(cat.seller ? cat.seller.name : 'Anonymous')+'</span>'+
              '</div>'+
              (cat.seller && cat.seller.wa
                ? '<a class="wa-btn" href="'+waHref+'" target="_blank" rel="noopener noreferrer">💬 WA</a>'
                : '')+
            '</div>'+
          '</div>';
        grid.appendChild(card);
      });
    })
    .catch(function(){
      document.getElementById('catGrid').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">😿</div><p>Gagal memuat iklan.</p></div>';
    });
})();
</script>
</body>
</html>
